name: ✨ Feature Request
description: Suggest a new feature or enhancement for the Elan Registry
title: "[Feature]: "
labels: ["enhancement", "status: needs-planning"]
assignees: []
body:
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Describe this feature from a user's perspective
      placeholder: "As a [type of user], I want [some goal] so that [some reason]"
    validations:
      required: true

  - type: textarea
    id: problem-solution
    attributes:
      label: Problem & Solution
      description: What problem does this solve and how?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What needs to be implemented for this to be complete?
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component Area
      options:
        - Database/Backend
        - User Interface/Frontend
        - Admin Interface
        - Maps/Images
        - Performance/Security
        - Documentation/Testing
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low - Nice to have
        - Medium - Would improve experience
        - High - Important for functionality
        - Critical - Essential for core operations
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Technical requirements, alternatives, screenshots, mockups, etc.