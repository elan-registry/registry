name: 🐛 Bug Report
description: Report a bug to help us improve the Elan Registry
title: "[Bug]: "
labels: ["bug", "status: needs-planning"]
assignees: []
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you were doing when it occurred
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL (if applicable)
      placeholder: https://elanregistry.org/...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device type
      placeholder: "Chrome on macOS Desktop"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Additional Context
      description: Add screenshots or additional details if helpful

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low - Minor issue
        - Medium - Affects functionality but has workarounds
        - High - Significantly impacts functionality
        - Critical - Prevents core functionality
    validations:
      required: true