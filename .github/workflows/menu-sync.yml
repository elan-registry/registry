name: Menu System Sync

on:
  # Trigger on push to production branch
  push:
    branches:
      - main
      - production
    # Only run when menu-related files change
    paths:
      - 'database/5.3-essential_config.sql'
      - 'scripts/menu-sync.php'
      - 'usersc/templates/*/navigation.php'
      - '.github/workflows/menu-sync.yml'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment for menu sync'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - test

      export_from_dev:
        description: 'Export from development first'
        required: true
        default: true
        type: boolean

jobs:
  menu-sync:
    runs-on: ubuntu-latest

    # Only run if not triggered by the sync bot to prevent loops
    if: ${{ !contains(github.event.head_commit.message, '[menu-sync-bot]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to check for changes

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, pdo, pdo_mysql

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Check for menu changes
        id: menu_changes
        run: |
          # Check if any menu-related files changed in the last commit
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
          MENU_CHANGED=false

          for file in $CHANGED_FILES; do
            case "$file" in
              database/5.3-essential_config.sql|scripts/menu-sync.php|usersc/templates/*/navigation.php)
                MENU_CHANGED=true
                break
                ;;
            esac
          done

          echo "menu_changed=$MENU_CHANGED" >> $GITHUB_OUTPUT
          echo "Menu files changed: $MENU_CHANGED"

      - name: Export menu configuration
        id: export_menu
        if: ${{ steps.menu_changes.outputs.menu_changed == 'true' || github.event.inputs.export_from_dev == 'true' }}
        run: |
          # Use the scripts/menu-sync.php to perform real export from development
          # This requires database access to development environment

          EXPORT_FILE="menu_export_$(date +%Y%m%d_%H%M%S).json"

          # For CI/CD workflow, we need to connect to actual development database
          # This is a placeholder implementation - real implementation would need:
          # 1. Development database connection credentials
          # 2. Network access to development environment
          # 3. Or a webhook/API endpoint on development to trigger export

          # TODO: Implement real database export
          # For now, create a structured export that can be manually populated
          cat > "$EXPORT_FILE" << EOF
          {
            "export_info": {
              "timestamp": "$(date -Iseconds)",
              "source_environment": "development",
              "menu_system": "classic",
              "version": "1.0",
              "commit_hash": "$GITHUB_SHA",
              "branch": "$GITHUB_REF_NAME",
              "note": "Manual export required - use scripts/menu-sync.php on development"
            },
            "pages": [],
            "permissions": [],
            "menus": [],
            "menu_permissions": [],
            "instructions": "Download this file and replace with real export from development using scripts/menu-sync.php"
          }
          EOF

          echo "export_file=$EXPORT_FILE" >> $GITHUB_OUTPUT
          echo "Menu configuration template created: $EXPORT_FILE"
          echo "⚠️  Manual action required: Use scripts/menu-sync.php to create real export"

      - name: Upload export artifact
        if: ${{ steps.export_menu.outputs.export_file != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: menu-export-${{ github.run_id }}
          path: ${{ steps.export_menu.outputs.export_file }}
          retention-days: 30

      - name: Deploy menu sync instructions
        if: ${{ (steps.menu_changes.outputs.menu_changed == 'true' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') }}
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          echo "🔄 Menu Sync Deployment Required"
          echo "Target environment: ${{ github.event.inputs.target_environment || 'production' }}"
          echo "Export template: ${{ steps.export_menu.outputs.export_file }}"
          echo ""
          echo "📋 Manual Steps Required:"
          echo "1. Access development environment: http://localhost:9999/elan_registry/scripts/menu-sync.php"
          echo "2. Click 'Export Menus' to download real menu data"
          echo "3. Access target environment menu sync tool"
          echo "4. Import the exported JSON file"
          echo "5. Verify menu synchronization completed successfully"
          echo ""
          echo "🌐 Environment URLs:"
          echo "- Development: http://localhost:9999/elan_registry/scripts/menu-sync.php"
          echo "- Test: http://localhost:9999/test_reg/scripts/menu-sync.php"
          echo "- Production: https://elanregistry.org/scripts/menu-sync.php"

      - name: Create deployment summary
        if: ${{ steps.export_menu.outputs.export_file != '' }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔄 Menu System Sync Summary

          **Export Details:**
          - 📁 File: `${{ steps.export_menu.outputs.export_file }}`
          - 🌍 Source: Development Environment
          - 📅 Timestamp: $(date)
          - 🔗 Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          **Changes Detected:**
          - Menu files modified: ${{ steps.menu_changes.outputs.menu_changed }}
          - Manual trigger: ${{ github.event_name == 'workflow_dispatch' }}

          **Manual Menu Sync Required:**
          1. 🔗 [Access Development Menu Sync](http://localhost:9999/elan_registry/scripts/menu-sync.php)
          2. 📤 Export real menu data from development
          3. 🔗 [Access Target Environment Menu Sync](${{ github.event.inputs.target_environment == 'test' && 'http://localhost:9999/test_reg/scripts/menu-sync.php' || 'https://elanregistry.org/scripts/menu-sync.php' }})
          4. 📥 Import the exported JSON file
          5. ✅ Verify menu navigation works correctly

          **Why Manual Process:**
          - CI/CD cannot access local development database
          - Menu sync requires live database connections
          - Manual process ensures data integrity and verification

          > **Workflow provides:** Export template and deployment instructions
          > **Manual action required:** Actual data export/import using menu sync tool
          EOF

      - name: Comment on PR (if applicable)
        if: ${{ github.event_name == 'pull_request' && steps.export_menu.outputs.export_file != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔄 Menu System Changes Detected

            This PR includes changes that will affect the menu system:

            - **Export Template Generated:** \`${{ steps.export_menu.outputs.export_file }}\`
            - **Menu System:** Classic Menu
            - **Action Required:** Manual menu sync using scripts/menu-sync.php

            ### 📋 Manual Menu Sync Process:
            - [ ] Access [Development Menu Sync](http://localhost:9999/elan_registry/scripts/menu-sync.php)
            - [ ] Export real menu data from development environment
            - [ ] Access target environment menu sync tool
            - [ ] Import the exported JSON file
            - [ ] Verify menu navigation works correctly
            - [ ] Check user permissions are maintained

            **Note:** CI/CD provides templates and instructions. Actual data export/import requires manual process due to database access limitations.

            *Generated by Menu Sync Workflow*`
            });

  # Job to notify about sync requirements
  notification:
    runs-on: ubuntu-latest
    needs: menu-sync
    if: ${{ always() && needs.menu-sync.result == 'success' }}

    steps:
      - name: Notify team (placeholder)
        run: |
          echo "Menu sync workflow completed"
          echo "Team notification would be sent here"
          # Could integrate with Slack, Discord, email, etc.

# Workflow configuration notes:
#
# Required Secrets:
# - PRODUCTION_HOST: Production server hostname/IP
# - PRODUCTION_USER: SSH user for production deployment
# - PRODUCTION_SSH_KEY: SSH private key for authentication
#
# Optional Secrets:
# - SLACK_WEBHOOK: For team notifications
# - DISCORD_WEBHOOK: Alternative notification method
#
# Future Enhancements:
# - Direct database connection for export/import
# - Rollback capability on import failure
# - Integration with staging environment
# - Automated testing of menu functionality post-import