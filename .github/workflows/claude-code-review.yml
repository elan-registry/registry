name: Claude Code Review

# Two automated review modes gated by PR base branch:
#
#   * -> milestone/*    : lightweight Sonnet backstop on every push. Focuses on
#                         what static tools (PHPStan / CodeQL / Semgrep) can't
#                         see: silent failures, arch fit, test gaps, CLAUDE.md
#                         violations. Assumes the author ran /review-pr locally.
#
#   milestone/* -> main : deep Opus review on PR open / ready_for_review /
#                         deep-review label. Cross-issue integration, release-
#                         notes accuracy, architecture drift, deploy readiness.
#                         Does NOT re-review line-by-line (done on issue PRs).
#
# On-demand deep review: post "@claude deep-review" on any PR — handled by
# claude.yml (gated to OWNER / COLLABORATOR).
#
# Drafts and [skip-review] / [WIP] titles are skipped in both modes.
#
# Posting mechanism (v1 action):
#   Claude must explicitly post via `gh pr comment` — the action does not
#   auto-post Claude's output. Prompts must include that instruction and
#   Bash(gh pr comment:*) must be in the allowedTools list.
#   track_progress: true shows a live "Claude is reviewing..." indicator.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]
    # No paths filter: workflow-only PRs (e.g. CI config changes) must also
    # trigger Claude review so the claude-code-action@v1 OIDC token validation
    # runs against the default-branch workflow file. A paths filter that
    # excludes .github/workflows/** causes validation to fail on those PRs.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (optional)"
        required: false
        type: number

jobs:
  # Lightweight review for PRs targeting milestone branches. Runs on every
  # push to a non-draft PR, OR on demand via workflow_dispatch so /finish-issue
  # can review a draft PR before marking it ready for merge.
  pr-to-milestone-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        startsWith(github.event.pull_request.base.ref, 'milestone/') &&
        !contains(github.event.pull_request.title, '[skip-review]') &&
        !contains(github.event.pull_request.title, '[WIP]') &&
        github.event.action != 'labeled'
      ) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR_NUM: ${{ inputs.pr_number }}
          PR_EVENT_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUM="$DISPATCH_PR_NUM"
          else
            PR_NUM="$PR_EVENT_NUM"
          fi
          BASE=$(gh pr view "$PR_NUM" --repo "$REPO" --json baseRefName -q .baseRefName)
          HEAD_REF=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName -q .headRefName)
          TITLE=$(gh pr view "$PR_NUM" --repo "$REPO" --json title -q .title)
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${BASE}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.ctx.outputs.pr_number }}/head

      - name: Run Claude Issue-Level Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          model: "claude-sonnet-5"
          claude_args: >-
            --allowedTools
            "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git diff --name-only:*),Bash(php -l *),Bash(composer check:php),Bash(vendor/bin/phpstan analyse:*),Bash(npm run lint),Read,Grep,Glob"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.ctx.outputs.pr_number }}

            You are reviewing an **issue-level PR** targeting a milestone branch.

            - Base: ${{ steps.ctx.outputs.base_ref }}
            - Head: ${{ steps.ctx.outputs.head_ref }}
            - Title: ${{ steps.ctx.outputs.title }}

            The author ran `/review-pr` locally before pushing. The parallel
            Static Analysis, CodeQL, and Semgrep jobs catch obvious issues.

            **You are the backstop.** Focus on what static tools cannot see.

            ## Scope

            Review only the diff on this PR:

            ```bash
            gh pr diff ${{ steps.ctx.outputs.pr_number }}
            ```

            Skip `vendor/**`, `node_modules/**`, and minified / generated assets.

            ## What to check

            - Does the change fit the architecture (CLAUDE.md patterns)?
            - Are there silent failures in catch blocks or fallback paths?
            - Are tests adequate for the behaviour being added?
            - Does it cross the Users (auth) vs Owners (registry domain) boundary?
            - Security-sensitive changes: CSRF, prepared statements, input validation

            ## What to skip

            - Type-hint absence, missing `declare(strict_types=1)`, unused imports —
              PHPStan / coding-standards checker flag these
            - Obvious SQL concatenation — CodeQL / Semgrep flag these
            - JS style issues — ESLint flags these

            ## Output

            Post your review as a PR comment using:

            ```bash
            gh pr comment ${{ steps.ctx.outputs.pr_number }} --body "..."
            ```

            Structure the comment with these sections (use exactly these headings):

            ### Blocking
            Must fix before merge (critical bugs, security issues, silent
            failures, CLAUDE.md violations). Omit this section entirely if
            there are no blocking issues — do NOT include an empty section.

            ### Important
            Should address (design, test gaps, unclear code).

            ### Suggestions
            Optional improvements.

            ### Strengths
            What's done well.

            Each item must cite `file:line` and the specific rule or reason.
            If there is nothing to say in a section, omit it entirely.
            Only post GitHub comments — do not output the review as a message.

      - name: Fail if review posted Blocking findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.ctx.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          # Anchor on "### Strengths" — present in every Claude review comment —
          # so we match the review, not a stray human comment.
          REVIEW_BODY=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.body | test("#+\\s+Strengths"))] | last | .body // ""' \
            2>/dev/null || echo "")
          if echo "$REVIEW_BODY" | grep -qE '^#{1,6} Blocking'; then
            echo "::error::Review posted Blocking findings — fix them before merging. See the PR comment for details."
            exit 1
          fi
          echo "✓ No Blocking section in review."


  # Deep review for milestone -> main PRs. Runs on open / ready_for_review
  # and when `deep-review` is explicitly requested via label.
  milestone-review:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'milestone/') &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'ready_for_review' ||
        (github.event.action == 'labeled' && github.event.label.name == 'deep-review')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Collect merged issue PR list
        id: merged-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILESTONE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Merged issue PRs against ${MILESTONE_BRANCH}:" > merged-prs.txt
          if ! gh pr list \
            --base "$MILESTONE_BRANCH" \
            --state merged \
            --limit 100 \
            --json number,title,mergedAt,author \
            --jq '.[] | "#\(.number) \(.title) (by @\(.author.login))"' \
            >> merged-prs.txt; then
            echo "::warning::Failed to fetch merged PR list — review will proceed with incomplete data"
            echo "WARNING: gh pr list failed. PR list above may be incomplete." >> merged-prs.txt
          fi
          PR_COUNT=$(grep -c '^#' merged-prs.txt || echo 0)
          echo "Collected ${PR_COUNT} merged PRs"
          cat merged-prs.txt

      - name: Run Claude Milestone-Level Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress is unsupported for the 'labeled' event — disable it
          # when the deep-review label triggers this job.
          track_progress: ${{ github.event.action != 'labeled' }}
          # Opus is worth it here: this runs once per milestone, not per push.
          model: "claude-opus-4-8"
          claude_args: >-
            --allowedTools
            "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(cat merged-prs.txt),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git diff --name-only:*),Bash(php -l *),Bash(composer check:php),Bash(vendor/bin/phpstan analyse:*),Bash(npm run lint),Read,Grep,Glob"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a **milestone release PR** targeting `main`.

            - Milestone branch: ${{ github.event.pull_request.head.ref }}
            - Title: ${{ github.event.pull_request.title }}

            This PR aggregates many issue PRs that were each individually
            reviewed on their own PR. **Do not review line by line.** That work
            is already done.

            Instead, focus on cross-issue and release-level concerns.

            ## Read the merged issue list

            ```bash
            cat merged-prs.txt
            ```

            The file lists issue PRs squash-merged into this milestone branch.

            ## Your tasks

            1. **Release notes accuracy** — compare `merged-prs.txt` against
               `docs/releases/RELEASE_NOTES_v*.md`. Every merged PR should be
               reflected. Flag missing, duplicated, or mis-categorized entries.

            2. **Architecture drift** — Is the aggregated shape coherent with the
               architecture (see `CLAUDE.md`)? Any cross-cutting changes that
               warrant a wiki update?

            3. **Cross-issue integration** — Are there interactions between merged
               PRs: shared types, shared DB schema, shared JS globals, API
               contract drift between endpoints different PRs touched?

               ```bash
               gh pr diff ${{ github.event.pull_request.number }}
               ```

            4. **Security surface of the aggregate** — Does the *sum* introduce a
               new vector (e.g., two PRs that each look fine but together create
               a CSRF bypass)?

            5. **Deployment readiness** — Any new env vars, migrations, feature
               flags, or pre-deploy steps missing from the release notes?

            ## Output

            Post your review as a PR comment using:

            ```bash
            gh pr comment ${{ github.event.pull_request.number }} --body "..."
            ```

            Structure the comment with these sections:

            # Milestone Review: <milestone branch>

            ## Release contents
            <bullet list of the merged PRs, grouped by theme>

            ## Blocking
            <critical issues that must be fixed before merge to main>
            Omit this section entirely if there are no blocking issues — do NOT include an empty section or write "None".

            ## Important
            <architecture, security, or integration concerns>

            ## Release-notes / docs gaps
            <missing or inaccurate release notes, wiki updates needed>

            ## Deployment checklist
            <env vars, migrations, feature flags, deploy steps>

            ## Strengths
            <what's well done at the milestone level>

            Each issue cites `file:line` or `PR #N`. Do not restate per-line
            findings already addressed on issue PRs.
            Only post GitHub comments — do not output the review as a message.

      - name: Fail if review posted Blocking findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Anchor on "## Strengths" — present in every Claude milestone review —
          # so we match the review, not a stray human comment.
          REVIEW_BODY=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq '[.[] | select(.body | test("#+\\s+Strengths"))] | last | .body // ""' \
            2>/dev/null || echo "")
          if echo "$REVIEW_BODY" | grep -qE '^#{1,6} Blocking'; then
            echo "::error::Review posted Blocking findings — fix them before merging. See the PR comment for details."
            exit 1
          fi
          echo "✓ No Blocking section in review."
