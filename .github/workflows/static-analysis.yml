name: Static Analysis

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**.php"
      - "phpstan.neon"
      - "composer.json"
      - "composer.lock"
      - "**.js"
      - "eslint.config.mjs"
      - ".github/workflows/static-analysis.yml"
  push:
    branches: [main]
    paths:
      - "**.php"
      - "phpstan.neon"
      - "**.js"
      - "eslint.config.mjs"
  workflow_dispatch:

jobs:
  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github --no-progress

  coding-standards:
    name: PHP Coding Standards Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      # Only check PHP files changed in this PR (or push).
      # Uses a temp directory with changed files to work with the
      # directory-based coding standards checker.
      - name: Run coding standards checker on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=$(git merge-base "${{ github.event.pull_request.base.sha }}" HEAD)
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED_PHP=$(git diff --name-only --diff-filter=ACMR "$BASE"..HEAD -- '*.php' || true)

          if [ -z "$CHANGED_PHP" ]; then
            echo "No PHP files changed — skipping."
            exit 0
          fi

          echo "Checking changed PHP files:"
          echo "$CHANGED_PHP"

          TMPDIR=$(mktemp -d)
          for f in $CHANGED_PHP; do
            mkdir -p "$TMPDIR/$(dirname "$f")"
            cp "$f" "$TMPDIR/$f"
          done

          php scripts/check-coding-standards.php "$TMPDIR"

  eslint:
    name: JavaScript Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
